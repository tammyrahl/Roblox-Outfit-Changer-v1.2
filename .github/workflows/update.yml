name: Auto Update Repository

on:
  schedule:
    - cron: "*/10 * * * *" # Каждые 10 минут
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create logs directory
        run: mkdir -p .github/workflows/logs

      - name: Update log
        run: |
          echo "Update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> .github/workflows/logs/update.log

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/workflows/logs/update.log

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto update logs"
          git push
